name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure GitHub Packages
        shell: pwsh
        run: |
          $sourceName = "github-ci-${{ github.run_id }}"
          dotnet nuget add source "https://nuget.pkg.github.com/Astrolune/index.json" `
            --name $sourceName `
            --username "${{ github.actor }}" `
            --password "${{ secrets.GITHUB_TOKEN }}" `
            --store-password-in-clear-text

      - name: Install Frontend Dependencies
        shell: pwsh
        run: |
          cd Astrolune.React
          npm ci

      - name: Build Frontend
        shell: pwsh
        run: |
          cd Astrolune.React
          npm run build

      - name: Restore .NET Projects
        shell: pwsh
        run: dotnet restore ./Astrolune.sln

      - name: Build Solution
        shell: pwsh
        run: dotnet build ./Astrolune.sln -c Release --no-restore -p:BundleModules=false -v minimal

      - name: Run Tests
        shell: pwsh
        run: dotnet test ./Astrolune.sln -c Release --no-build --verbosity normal

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/TestResults/"
          retention-days: 7
