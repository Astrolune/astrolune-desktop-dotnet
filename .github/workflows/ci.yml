name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pack Local SDK
        shell: pwsh
        run: |
          ./tools/PrepareLocalPackages.ps1

      - name: Install Frontend Dependencies
        run: |
          cd Astrolune.React
          npm ci

      - name: Build Frontend
        run: |
          cd Astrolune.React
          npm run build

      - name: Restore
        run: dotnet restore ./Astrolune.sln

      - name: Build
        run: dotnet build ./Astrolune.sln -c Release --no-restore

      - name: Test
        run: dotnet test ./Astrolune.sln -c Release --no-build --verbosity normal
